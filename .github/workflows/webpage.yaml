name: Webpage

on:
  push:
    branches:
      - main
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: 'npm'
          cache-dependency-path: webpage/package-lock.json

      - name: Install dependencies
        run: cd webpage && npm ci

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache: true

      - name: Generate Docs
        run: sh .github/scripts/ci/generate-docs.sh

      - name: Migrate Docs
        run: sh .github/scripts/ci/migrate-docs.sh

      - name: Build site
        run: cd webpage && npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: webpage/dist
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
